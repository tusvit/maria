<!DOCTYPE html>
<html lang="pl">

    background: url("avatar.png") no-repeat center center fixed;

/* затемнение, чтобы текст был читаемым */

    background: rgba(0, 0, 0, 0.55);

}

}

    margin-top: 15px;
    padding: 12px 25px;
    background-color: #d18aa5;
    color: white;
    text-decoration: none;
    border-radius: 25px;
    transition: 0.3s;
}

.button:hover {
    background-color: #b76e79;
}
