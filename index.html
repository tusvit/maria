<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maria Nails Studio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;

    background: url("avatar.png") no-repeat center center fixed;
    background-size: cover;
}

/* затемнение */
.overlay {
    background: rgba(0, 0, 0, 0.55);
    min-height: 100vh;

    /* главное для адаптива */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    text-align: center;
    padding: 40px 20px;
    box-sizing: border-box;
}

/* адаптивный контейнер */
.container {
    max-width: 700px;
    width: 100%;
}

h1 {
    font-size: 42px;
    color: #f5c6d6;
    margin-bottom: 10px;
}

p {
    font-size: 18px;
    line-height: 1.6;
}

.section {
    margin-top: 30px;
}

.button {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 25px;
    background-color: #d18aa5;
    color: white;
    text-decoration: none;
    border-radius: 25px;
    transition: 0.3s;
}

.button:hover {
    background-color: #b76e79;
}

/* 📱 АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНА */
@media (max-width: 600px) {
    h1 {
        font-size: 30px;
    }

    p {
        font-size: 16px;
    }

    .button {
        width: 100%;
        display: block;
    }
}
</style>

</head>

<body>

<div class="overlay">

<div class="container">

<h1>Maria Nails Studio</h1>

<p>
Cześć! Jestem Maria 💕<br>
Tworzę piękne i eleganckie paznokcie ✨
</p>

<div class="section">
<h2>💖 O mnie</h2>
<p>
Manicure hybrydowy • klasyczny • artystyczny
</p>
</div>

<div class="section">
<h2>📍 Lokalizacja</h2>

<a class="button" 
href="https://maps.app.goo.gl/MHfcfnUBae1vnuWx6?g_st=ic"
target="_blank">
Otwórz w Google Maps
</a>
</div>

<div class="section">
<h2>📸 Instagram</h2>

<a class="button" 
href="https://www.instagram.com/mkholodna.beauty?igsh=ZG9xNGR5dmhxZmd3"
target="_blank">
Przejdź do Instagrama
</a>
</div>

</div>

</div>

</body>
</html>
