<<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maria Nails Studio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* 🎥 АНИМИРОВАННЫЙ ФОН */
.bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 110%;
    height: 110%;
    background: url("avatar.png") no-repeat center center;
    background-size: cover;
    animation: zoomMove 20s infinite alternate ease-in-out;
    filter: brightness(0.8) contrast(1.1);
    z-index: -2;
}

/* мягкий градиент поверх */
.overlay-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.8));
    z-index: -1;
}

/* 🎬 анимация фона */
@keyframes zoomMove {
    0% {
        transform: scale(1) translate(0px, 0px);
    }
    100% {
        transform: scale(1.1) translate(-20px, -10px);
    }
}

.overlay {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
    box-sizing: border-box;

    animation: fadeIn 1.2s ease-in;
}

/* плавное появление */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.container {
    max-width: 750px;
    width: 100%;
}

h1 {
    font-size: 44px;
    color: #f5c6d6;
    margin-bottom: 10px;
    letter-spacing: 1px;
}

p {
    font-size: 18px;
    line-height: 1.6;
}

.section {
    margin-top: 30px;
}

.services {
    font-size: 18px;
    line-height: 1.8;
    margin-top: 15px;
    opacity: 0.95;
}

.button {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 25px;
    background-color: #d18aa5;
    color: white;
    text-decoration: none;
    border-radius: 30px;
    transition: 0.3s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.button:hover {
    background-color: #b76e79;
    transform: translateY(-2px);
}

/* 📱 MOBILE */
@media (max-width: 600px) {
    h1 {
        font-size: 30px;
    }

    p, .services {
        font-size: 16px;
    }

    .button {
        width: 100%;
    }
}
</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay-bg"></div>

<div class="overlay">

<div class="container">

<h1>Maria Nails Studio</h1>

<p>
Cześć! Jestem Maria 💕<br>
Tworzę piękne i eleganckie paznokcie ✨
</p>

<div class="section">
<h2>💖 Usługi</h2>

<div class="services">
Manicure hybrydowy | żelowy<br>
Pedicure hybrydowy | SPA pedicure<br>
SPA dla dłoni w prezencie 💝
</div>
</div>

<div class="section">
<h2>📍 Lokalizacja</h2>

<a class="button" 
href="https://maps.app.goo.gl/MHfcfnUBae1vnuWx6?g_st=ic"
target="_blank">
Otwórz w Google Maps
</a>
</div>

<div class="section">
<h2>📸 Instagram</h2>

<a class="button" 
href="https://www.instagram.com/mkholodna.beauty?igsh=ZG9xNGR5dmhxZmd3"
target="_blank">
Przejdź do Instagrama
</a>
</div>

</div>

</div>

</body>
</html>
